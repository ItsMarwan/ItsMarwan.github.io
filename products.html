<!DOCTYPE html>
<html lang="en" class="scroll-smooth">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ItsMarwan's Products</title>
    <meta name="title" content="ItsMarwan's Products">
    <meta name="description" content="Discover ItsMarwan's premium UEFN products, including Verse scripts, custom materials, Niagara effects, and animations to enhance your Fortnite Creative projects.">
    <meta name="keywords" content="UEFN, Fortnite, Verse, Game Development, Tutorials, Custom Assets, Game Mechanics, ItsMarwan">
    <meta name="thumbnail" content="/imgs/brand.png">
    <meta name="theme-color" content="#2D7EEA">
    <link rel="icon" type="image/png" href="/imgs/brand.png">
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.1.1/css/all.min.css">
    <link rel="stylesheet" href="/css/stylesheet.css">
    <meta name="keywords" content="marwan, itsmarwan, fortnite creative, uefn, server, official">
    <meta name="website" content="index, follow"><meta http-equiv="Content-Type" content="text/html; charset=utf-8">
    <meta name="language" content="English">
    <link rel="stylesheet" href="https://site-assets.fontawesome.com/releases/v6.7.2/css/all.css">
    <link rel="stylesheet" href="https://site-assets.fontawesome.com/releases/v6.7.2/css/sharp-solid.css">
    <link rel="stylesheet" href="https://site-assets.fontawesome.com/releases/v6.7.2/css/sharp-regular.css">
    <link rel="stylesheet" href="https://site-assets.fontawesome.com/releases/v6.7.2/css/sharp-light.css">
    <link rel="stylesheet" href="https://site-assets.fontawesome.com/releases/v6.7.2/css/duotone.css">
    <link rel="stylesheet" href="https://site-assets.fontawesome.com/releases/v6.7.2/css/brands.css">
</head>
<body class="text-gray-200 min-h-screen">
    <div id="loading-screen" class="loading-screen flex flex-col items-center justify-center">
        <i class="fa-solid fa-brackets-curly text-4xl fa-beat"></i>
        <p id="loading-text" class="loading-text-transition text-white text-xl mt-4"></p>
    </div>

    <div id="navbar-placeholder"></div>
    
    <main class="py-24 container mx-auto px-4 md:px-8">
        <section id="projects" class="text-center">
            <div style="margin: 20px;"><h2 style="display: inline;" class="text-5xl font-extrabold text-neon mb-4 animate-fadeInUp">My </h2><h2 style="display: inline;" class="text-5xl font-extrabold mb-4 animate-fadeInUp">Products</h2></div>
            <p class="text-xl text-gray-400 mb-12 max-w-2xl mx-auto animate-fadeInUp"> 
                Explore my high-quality systems, visual effects, and assets designed for reliability, and seamless integration into your projects.
            </p>

            <div class="mb-8 max-w-lg mx-auto">
                <div class="relative flex items-center">
                    <input id="search-input" type="text" placeholder="Search for products..." class="w-full px-6 py-3 rounded-full bg-gray-800 text-gray-200 border border-gray-700 focus:outline-none focus:ring-2 focus:ring-blue-500 transition-all pl-12" />
                    <i class="fas fa-search absolute left-4 text-gray-400"></i>
                </div>
            </div>

            <div class="flex justify-center items-center flex-wrap gap-4 mb-8">
                <button class="filter-btn px-6 py-2 rounded-full font-semibold transition-colors duration-300 text-sm md:text-base active-filter" data-filter="all">All</button>
                <button class="filter-btn px-6 py-2 rounded-full font-semibold transition-colors duration-300 text-sm md:text-base" data-filter="Verse">Verse</button>
                <button class="filter-btn px-6 py-2 rounded-full font-semibold transition-colors duration-300 text-sm md:text-base" data-filter="Materials">Materials</button>
                <button class="filter-btn px-6 py-2 rounded-full font-semibold transition-colors duration-300 text-sm md:text-base" data-filter="Niagara">Niagara</button>
                <button class="filter-btn px-6 py-2 rounded-full font-semibold transition-colors duration-300 text-sm md:text-base" data-filter="Animations">Animations</button>
                <button class="filter-btn px-6 py-2 rounded-full font-semibold transition-colors duration-300 text-sm md:text-base" data-filter="Free">Free</button>
            </div>

            <div id="projects-grid" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-8">
                </div>
            
            <div id="load-more-container" class="mt-8 text-center" style="display: none;">
                <button id="load-more-btn" class="px-8 py-3 rounded-full font-semibold transition-colors duration-300 text-sm md:text-base bg-blue-500 hover:bg-blue-600 text-white shadow-lg">Load More</button>
            </div>
        </section>
        <div id="shop-container">
            <div id="shop-modal" class="fixed inset-0 z-[100] flex items-center justify-center bg-black bg-opacity-75">
                <div id="shop-modal-content" class="modal-content-style w-11/12 max-w-md rounded-xl p-6 shadow-2xl" style="background-color: #0f172a; border: 1px solid #334155;">
                    <div class="flex justify-between items-center pb-4 border-b border-gray-600">
                        <h3 class="text-2xl font-bold text-white">Choose a Shop</h3>
                        <button id="close-modal-btn" class="text-gray-400 hover:text-white transition-colors">
                            <i class="fa-solid fa-xmark text-3xl"></i>
                        </button>
                    </div>
                    <p class="text-gray-300 my-6 text-center">Where would you like to purchase this item?</p>
                    <div class="flex flex-col gap-4">
                        <a id="buymeacoffee-link" href="#" target="_blank" rel="noopener noreferrer" class="shop-btn bmc">
                            <img src="/imgs/bmc.png" alt="Buy Me a Coffee" class="shop-icon">
                            <span>Buymeacoffee</span>
                        </a>

                        <a id="patreon-link" href="#" target="_blank" rel="noopener noreferrer" class="shop-btn patreon">
                            <i class="fa-brands fa-patreon mr-3"></i>
                            <span>Patreon</span>
                        </a>
                    </div>
                </div>
            </div>
        </div>

    </main>

    <div id="footer-placeholder"></div>
    <button id="back-to-top" class="back-to-top-btn bg-gray-800 text-white p-3 rounded-full shadow-lg hover:bg-gray-700 transition-colors duration-300">
        <i class="fas fa-arrow-up"></i>
    </button>
    <script>
        // Adjusts the body padding to account for the fixed navbar height.
        document.addEventListener('DOMContentLoaded', function() {
            const navbar = document.querySelector('nav');
            if (navbar) {
                const navHeight = navbar.offsetHeight;
            }
        });
        
        // Positions the mobile menu just below the main navbar.
        document.addEventListener('DOMContentLoaded', positionMobileMenu);
        window.addEventListener('resize', positionMobileMenu);

        function positionMobileMenu() {
            const navbar = document.querySelector('nav');
            const mobileMenu = document.getElementById('mobile-menu');
            if (navbar && mobileMenu) {
                const navHeight = navbar.offsetHeight;
                mobileMenu.style.top = navHeight + 'px';
            }
        }
    </script>
    <script src="/javascript/index.js"></script>
    <script src="/javascript/loaders.js"></script>
    <script src="/javascript/loading.js"></script>
</body>
</html>
