<!DOCTYPE html>
<html lang="en" class="scroll-smooth">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="title" content="404 Page Not Found">
    <title>404 Page Not Found</title>
    <meta name="description" content="The page you're looking for doesn't exist. It might have been moved or deleted.">
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.1.1/css/all.min.css">
    <link rel="stylesheet" href="/css/stylesheet.css">
    <style>
        /* Custom styles for the 404 page */
        .error-container {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            text-align: center;
            position: relative;
            z-index: 10;
        }

        .error-code {
            font-size: 10rem;
            font-weight: 700;
            line-height: 1;
            text-shadow: 0 0 20px rgba(0, 229, 255, 0.5);
            animation: glitch 1.5s infinite;
        }

        .error-message {
            opacity: 0;
            font-size: 2rem;
            font-weight: 600;
            animation: fadeInSlideUp 1s ease-out forwards;
            animation-delay: 0.5s;
        }

        .error-description {
            opacity: 0;
            font-size: 1rem;
            max-width: 500px;
            margin-top: 1rem;
            animation: fadeInSlideUp 1s ease-out forwards;
            animation-delay: 0.7s;
        }

        .home-button {
            opacity: 0;
            margin-top: 2rem;
            animation: fadeInSlideUp 1s ease-out forwards;
            animation-delay: 0.9s;
        }

        @keyframes glitch {
            0%, 100% {
                text-shadow: 0 0 20px rgba(0, 229, 255, 0.5), 
                             2px 2px 2px #ff00c8, 
                             -2px -2px 2px #00ffc8;
                transform: translate(0);
            }
            25% {
                text-shadow: 0 0 20px rgba(0, 229, 255, 0.5), 
                             -2px 2px 2px #ff00c8, 
                             2px -2px 2px #00ffc8;
                transform: translate(-5px, 5px);
            }
            50% {
                text-shadow: 0 0 20px rgba(0, 229, 255, 0.5), 
                             -2px -2px 2px #ff00c8, 
                             2px 2px 2px #00ffc8;
                transform: translate(5px, -5px);
            }
            75% {
                text-shadow: 0 0 20px rgba(0, 229, 255, 0.5), 
                             2px -2px 2px #ff00c8, 
                             -2px 2px 2px #00ffc8;
                transform: translate(-5px, -5px);
            }
        }
    </style>
</head>
<body class="text-gray-200 min-h-screen">
    <div class="error-container">
        <h1 class="error-code text-neon">404</h1>
        <h2 class="error-message text-white">Page Not Found</h2>
        <p class="error-description text-gray-400">
            It looks like the page you were trying to reach has been lost in the digital cosmos.
            Let's get you back to a familiar place.
        </p>
        <div class="home-button">
            <a href="/" class="inline-block px-8 py-4 bg-gradient-to-r from-blue-500 to-blue-700 text-white font-bold rounded-full shadow-lg hover:shadow-xl transform hover:scale-105 transition duration-300">
                Go to Homepage
            </a>
        </div>
    </div>
    <script src="/javascript/index.js"></script>
</body>
</html>
